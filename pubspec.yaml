name: schedule_extractor
description: 从文字、截图、文件中提取日程和待办事项
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3

  # 本地存储
  sqflite: ^2.3.2
  sqflite_common_ffi: '>=2.3.0 <2.4.0'  # 2.3.x 用 sqlite3 2.x（DynamicLibrary，非 native assets）
  sqlite3_flutter_libs: ^0.5.0           # 为 Windows 打包 sqlite3.dll，兼容 sqlite3 2.x
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # 文件/图片选择
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # 状态管理
  provider: ^6.1.2

  # 工具
  intl: ^0.19.0
  path: ^1.9.0
  url_launcher: ^6.3.0
  flutter_markdown_plus: ^1.0.7

  # Widget 桥接（iOS/macOS 小组件）
  home_widget: ^0.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.8

msix_config:
  display_name: 枫枫子的备忘录
  publisher_display_name: Feng Calendar
  identity_name: com.feng.calendar
  msix_version: 1.0.0.0
  logo_path: assets/icon.png
  capabilities: internetClient,privateNetworkClientServer
  languages: zh-cn,en-us
  install_certificate: false

flutter_launcher_icons:
  image_path: "assets/icon.png"
  ios: true
  android: true
  macos:
    generate: true
    image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
