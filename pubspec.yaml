name: schedule_extractor
description: 从文字、截图、文件中提取日程和待办事项
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3

  # 本地存储
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # 文件/图片选择
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # 状态管理
  provider: ^6.1.2

  # 工具
  intl: ^0.19.0
  path: ^1.9.0

  # Widget 桥接（iOS/macOS 小组件）
  home_widget: ^0.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
