name: Build All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:      # 允许手动触发

env:
  FLUTTER_VERSION: '3.38.2'
  APP_NAME: 枫枫子的备忘录

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
            build/app/outputs/flutter-apk/app-release-armeabi-v7a.apk

  # ── Windows EXE ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "build/${{ env.APP_NAME }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: build/${{ env.APP_NAME }}-windows.zip

  # ── macOS DMG ────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release --no-codesign

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder "build/macos/Build/Products/Release/${{ env.APP_NAME }}.app" \
            -ov -format UDZO \
            "build/${{ env.APP_NAME }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/${{ env.APP_NAME }}.dmg

  # ── 打包 Release（仅推 tag 时触发）────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-zip/*.zip
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true
